<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - NyumbaFind KE</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div class="max-w-md mx-auto p-6 mt-12">
        <div class="bg-white rounded-3xl shadow-2xl p-8">
            <h1 class="text-3xl font-bold text-green-700 text-center mb-2">Create Account</h1>
            <p class="text-center text-gray-600 mb-8"> Create account as Landlord</p>

            <form method="POST" class="space-y-6">
                {% csrf_token %}

                <div>
                    <label class="block text-sm font-medium mb-2">Username</label>
                    <input type="text" name="username" class="w-full border border-gray-300 rounded-xl px-4 py-3" required>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">Password</label>
                    <input type="password" name="password1" class="w-full border border-gray-300 rounded-xl px-4 py-3" required>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">Confirm Password</label>
                    <input type="password" name="password2" class="w-full border border-gray-300 rounded-xl px-4 py-3" required>
                </div>

                <button type="submit"
                        class="w-full bg-green-600 hover:bg-green-700 text-white py-4 rounded-2xl font-semibold text-lg">
                    Create My Account
                </button>
            </form>

            <p class="text-center mt-6 text-gray-600">
                Already have an account?
                <a href="/login/" class="text-green-600 font-medium hover:underline">Login</a>
            </p>
        </div>
    </div>
</body>
</html>

<footer class="bg-gray-900 text-white py-12 mt-16">
    <div class="max-w-6xl mx-auto px-6 text-center">
        <p class="text-xl font-semibold mb-2">NyumbaFind KE</p>
        <P class="text-gray-400">Connecting Landlords & Tenants Across Kenya</P>
        <p class="text-sm text-gray-500 mt-8">© 2026 NyumbaFind KE. All Rights Reserved.</p>
    </div>
</footer>
