<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete House - NyumbaFind KE</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div class="max-w-md mx-auto p-6 mt-12">
        <div class="bg-white rounded-3xl shadow-2xl p-8 text-center">
            <h1 class="text-3xl font-bold text-red-600 mb-4">Delete House?</h1>
            <p class="text-gray-600 mb-8">
                Are you sure you want to delete <strong>"{{ property.title }}"</strong>?<br>
                This action cannot be undone
            </p>

            <form method="POST" class="space-y-4">
                {% csrf_token %}

                <button type="submit"
                        class="w-full bg-red-600 hover:bg-red-700 text-white py-4 rounded-2xl font-semibold text-lg">
                    Yes, Delete House
                </button>
                <a href="/my-property/"
                   class="block w-full text-center bg-gray-300 hover:bg-gray-400 text-gray-800 py-4 rounded-2xl font-semibold">
                    Cancel
                </a>
            </form>
        </div>
    </div>
</body>
</html>

<footer class="bg-gray-900 text-white py-12 mt-16">
    <div class="max-w-6xl mx-auto px-6 text-center">
        <p class="text-xl font-semibold mb-2">NyumbaFind KE</p>
        <P class="text-gray-400">Connecting Landlords & Tenants Across Kenya</P>
        <p class="text-sm text-gray-500 mt-8">© 2026 NyumbaFind KE. All Rights Reserved.</p>
    </div>
</footer>
