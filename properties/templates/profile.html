<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - NyumbaFind KE</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div  class="max-w-md mx-auto p-6 mt-10">
        <div class="bg-white rounded-3xl shadow-2xl p-8">
            <h1 class="text-3xl font-bold text-green-700 text-center mb-2">My Profile</h1>
            <p class="text-center text-gray-600 mb-8">Update your contact details</p>

            <form method="POST" class="space-y-6">
                {% csrf_token %}

                <div>
                    <label class="block text-sm font-medium mb-2">Username</label>
                    <input type="text" value="{{ user.name }}"
                           class="w-full border border-gray-300 rounded-xl px-4 py-3 bg-gray-100">
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">Phone Number (+2547XXXXXXXX or +2541XXXXXXXX)</label>
                    <input type="text" name="phone_number" value="{{ profile.phone_number|default:'' }}"
                           placeholder="+2547XXXXXXXXX or +2541XXXXXXXX" maxlength="10"
                           class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:border-green-500">
                </div>

                <button type="submit"
                        class="w-full bg-green-600 hover:bg-green-700 text-white py-4 rounded-2xl font-semibold text-lg">
                    📱 Save Phone Number
                </button>
            </form>

            <div class="mt-6 text-center">
                <a href="/my-properties/" class="text-green-600 hover:underline">← Back to My Houses</a>
        </div>
        </div>
    </div>
</body>
</html>
