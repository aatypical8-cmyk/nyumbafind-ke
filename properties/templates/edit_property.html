<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit House - NyumbaFind KE</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
<div class="max-w-2xl mx-auto p-6 mt-8">
    <div class="bg-white rounded-3xl shadow-2xl p-8">
        <h1 class="text-3xl font-bold text-green-700 text-center mb-2">Edit House</h1>
        <p class="text-center text-gray-600 mb-8">{{ property.title }}</p>

        <form method="POST" enctype="multipart/form-data" class="space-y-6">
            {% csrf_token %}

            <div>
                <label class="block text-sm font-medium mb-2">Title</label>
                <input type="text" name="title" value="{{ property.title }}" required
                       class="w-full border border-gray-300 rounded-xl px-4 py-3">
            </div>

            <div>
                <label class="block text-sm font-medium mb-2">County</label>
                <input tyep="text" name="county" value="{{ property.county }}" required
                       class="w-full border border-gray-300 rounded-xl px-4 py-3">
            </div>

            <div>
                <label class="block text-sm font-medium mb-2">Town</label>
                <input type="text" name="town" value="{{ property.town }}" required
                       class="w-full border border-gray-300 rounded-xl px-4 py-3">
            </div>

            <div>
                <label class="block text-sm font-medium mb-2">Location</label>
                <input type="text" name="location" value="{{ property.location }}" required
                       class="w-full border border-gray-300 rounded-xl px-4 py-3">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium mb-2">Bedrooms</label>
                    <input type="number" name="bedrooms" value="{{ property.bedrooms }}" required
                           class="w-full border border-gray-300 rounded-xl px-4 py-3">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">Bathrooms</label>
                    <input type="number" name="bathrooms" value="{{ property.bathrooms }}" required
                           class="w-full border border-gray-300 rounded-xl px-4 py3">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium mb-2">Price (Ksh)</label>
                <input type="number" name="price" value="{{ property.price }}" required
                       class="w-full border border-gray-300 rounded-xl px-4 py-3">
            </div>

            <div>
                <label class="block text-sm font-medium mb-2">Description</label>
                <textarea name="description" rows="5" required
                          class="w-full border border-gray-300 rounded-xl px-4 py-3">{{ property.description }}</textarea>
            </div>

            <!-- Image Upload -->
            <div>
                <label class="block text-sm font-medium mb-2">Change Image (Optional)</label>
                <input type="file" name="images" accept="image/*" multiple
                       class="w-full border border-gray-300 rounded-xl px-4 py-3">
                <p class="text-xs text-grsay-500 mt-1">Leave empty to keep current images</p>
            </div>

            <div class="flex gap-4 pt-4">
                <button type="submit"
                        class="flex-1 bg-green-600 hover:bg-green-700 text-white py-4 rounded-2xl font-semibold">
                    Save Changes
                </button>
                <a href="/my-properties/"
                   class="flex-1 text-center bg-gray-300 hover:bg-gray-400 text-gray-800 py-4 rounded-2xl font-semibold">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
</body>
<body>
</body>
</html>

<footer class="bg-gray-900 text-white py-12 mt-16">
    <div class="max-w-6xl mx-auto px-6 text-center">
        <p class="text-xl font-semibold mb-2">NyumbaFind KE</p>
        <P class="text-gray-400">Connecting Landlords & Tenants Across Kenya</P>
        <p class="text-sm text-gray-500 mt-8">© 2026 NyumbaFind KE. All Rights Reserved.</p>
    </div>
</footer>
