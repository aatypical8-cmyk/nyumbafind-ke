<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post New House - NyumbaFind KE</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div class="max-w-2xl mx-auto p-6 mt-8">
        <div class="bg-white rounded-3xl shadow-2xl p-8">
            <h1 class="text-3xl font-bold text-green-700 text-center mb-2">Post New House</h1>
            <p class="text-center text-gray-600 mb-8">Post Your House and Images</p>

            <form method="POST" enctype="multipart/form-data" class="space-y-6">
                {% csrf_token %}

                <div>
                    <label class="block text-sm font-medium mb-2">Title</label>
                    <input type="text" name="title" required class="w-full border border-gray-300 rounded-xl px-4 py-3">
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">County</label>
                    <select name="county" required class="w-full border border-gray-300 rounded-xl px-4 py-3">
                        <option value="">Choose County...</option>
                        <option value="Nairobi">Nairobi</option>
                        <option value="Kiambu">Kiambu</option>
                        <option value="Nakuru">Nakuru</option>
                        <option value="Mombasa">Mombasa</option>
                        <option value="Kisumu">Kisumu</option>
                        <option value="Uasin Gishu">Eldoret</option>
                        <option value="Meru">Meru</option>
                        <option value="Nyeri">Nyeri</option>
                        <option value="Kakamega">Kakamega</option>
                        <option value="Bungoma">Bungoma</option>
                        <option value="Kilifi">Kilifi</option>
                        <option value="Kwale">Kwale</option>
                        <option value="Taita Taveta">Taita Taveta</option>
                        <option value="Machakos">Machakos</option>
                        <option value="Kitui">Kitui</option>
                        <option value="Makueni">Makueni</option>
                        <option value="Garissa">Garissa</option>
                        <option value="Wajir">Wajir</option>
                        <option value="Mandera">Mandera</option>
                        <option value="Marsabit">Marsabit</option>
                        <option value="Isiolo">Isiolo</option>
                        <option value="Turkana">Turkana</option>
                        <option value="West Pokot">West Pokot</option>
                        <option value="Samburu">Samburu</option>
                        <option value="Trans Nzoia">Trans Nzoia</option>
                        <option value="Elgeyo Marakwet">Elgeyo Marakwet</option>
                        <option value="Nandi">Nandi</option>
                        <option value="Baringo">Baringo</option>
                        <option value="Laikipia">Laikipia</option>
                        <option value="Narok">Narok</option>
                        <option value="Kajiado">Kajiado</option>
                        <option value="Kericho">Kericho</option>
                        <option value="Bomet">Bomet</option>
                        <option value="Homa Bay">Homa Bay</option>
                        <option value="Migori">Migori</option>
                        <option value="Siaya">Siaya</option>
                        <option value="Vihiga">Vihiga</option>
                        <option value="Busia">Busia</option>
                        <option value="Tana River">Tana River</option>
                        <option value="Lamu">Lamu</option>
                        <option value="Embu">Embu</option>
                        <option value="Tharaka Nithi">Tharaka Nithi</option>
                        <option value="Murang\'a'">'Murang\'a'</option>
                        <option value="Kirinyaga">Kirinyaga</option>>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">Town</label>
                    <input type="text" name="town" required class="w-full border border-gray-300 rounded-xl px-4 py-3">
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">Exact Location</label>
                    <input type="text" name="location" required class="w-full border border-gray-300 rounded-xl px-4 py-3">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-2">Bedrooms</label>
                        <input type="number" name="bedrooms" class="w-full border border-gray-300 rounded-xl px-4 py-3">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Bathrooms</label>
                        <input type="number" name="bathrooms" class="w-full border border-gray-300 rounded-xl px-4 py-3">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">Rent Per Month (Ksh)</label>
                    <input type="number" name="price" required class="w-full border border-gray-300 rounded-xl px-4 py-3">
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">Description</label>
                    <textarea name="description" rows="4" required class="w-full border border-gray-300 rounded-xl px-4 py-3"></textarea>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">House Pictures</label>
                    <input type="file" name="images" id="image-input" accept="image/*" multiple
                           class="w-full border border-gray-300 rounded-xl px-4 py-3">
                    <p class="text-xs text-gray-500 mt-1">Maximum 5 photos</p>

                    <div id="image-preview-container" class="grid grid-cols-5 gap-2 mt-4"></div>
                </div>

                <button type="submit"
                        class="w-full bg-green-600 hover:bg-green-700 text-white py-4 rounded-2xl font-semibold text-lg">
                    Post Your House
                </button>
            </form>
        </div>
    </div>

<script>
    const imageInput = document.getElementById('image-input');
    const previewContainer = document.getElementById('image-preview-container');

    imageInput.addEventListener('change', function() {
        previewContainer.innerHTML = ''; // Clear old previews
        const files = Array.from(this.files).slice(0, 5); // Limit to 5 for preview

        files.forEach(file ⇒ {
            const reader = new FileReader();
            reader.onload = function(e) {
                const imgDiv = document.createElement('div');
                imgDiv.className = 'relative';
                imgDiv.innerHTML = `
                    <img src="${e.target.result}" class="w-full h-20 object-cover rounded-lg border shadow-sm">
                `;
                previewContainer.appendChild(imgDiv);
            }
            reader.readAsDataURL(file);
        });
    });
</script>
</body>
</html>
